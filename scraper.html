<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scraper MercadoLibre — PideFacil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #F15200;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #666;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    header .logo {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p  { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      background: transparent;
      color: var(--text);
    }

    .options-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .options-row label { font-size: .85rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .options-row select {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .85rem;
      background: var(--surface);
      cursor: pointer;
    }
    .options-row .qty-input {
      width: 64px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .85rem;
      text-align: center;
    }

    /* ── Buttons ── */
    .btn {
      cursor: pointer;
      border: none;
      padding: 9px 22px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Status ── */
    .status {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 14px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status .spinner {
      width: 14px; height: 14px;
      border: 2.5px solid #ddd;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .status.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Preview cards ── */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .preview-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: .78rem;
      box-shadow: var(--shadow);
      transition: transform .15s;
      cursor: default;
    }
    .preview-card:hover { transform: translateY(-2px); }
    .preview-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
    }
    .preview-card .pc-body { padding: 8px; }
    .preview-card .pc-name {
      font-weight: 600;
      font-size: .75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .preview-card .pc-price { color: var(--primary); font-weight: 700; font-size: .82rem; }
    .preview-card .pc-old {
      text-decoration: line-through;
      color: var(--muted);
      font-size: .72rem;
    }
    .preview-card .pc-disc {
      background: #fff3f0;
      color: var(--primary);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .7rem;
      font-weight: 700;
      display: inline-block;
      margin-top: 3px;
    }
    .preview-card .pc-cond {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: capitalize;
    }

    /* ── JSON output ── */
    .output-section {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .output-header span { font-size: .85rem; font-weight: 600; color: var(--muted); }
    .output-actions { display: flex; gap: 8px; }

    textarea#jsonOut {
      display: block;
      width: 100%;
      height: 340px;
      border: none;
      outline: none;
      padding: 14px;
      font-family: 'Fira Mono', 'Cascadia Code', monospace;
      font-size: .78rem;
      resize: vertical;
      background: #1e1e1e;
      color: #d4d4d4;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a1a;
      color: #fff;
      padding: 9px 22px;
      border-radius: 20px;
      font-size: .85rem;
      z-index: 9999;
      transition: transform .25s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .error-msg {
      background: #fff3f0;
      border: 1.5px solid #ffbba8;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">🛒</div>
    <div>
      <h1>Scraper MercadoLibre</h1>
      <p>Busca productos y obtén el JSON listo para importar a la BD</p>
    </div>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <input type="text" id="queryInput" placeholder="Ej: camiseta deportiva, zapatos tenis, licuadora..." autocomplete="off">
    <button class="btn btn-primary" id="btnSearch" onclick="doSearch()">Buscar</button>
  </div>

  <!-- Options -->
  <div class="options-row">
    <label>
      País
      <select id="siteSel">
        <option value="MCO">🇨🇴 Colombia</option>
        <option value="MLA">🇦🇷 Argentina</option>
        <option value="MLB">🇧🇷 Brasil</option>
        <option value="MLM">🇲🇽 México</option>
        <option value="MLC">🇨🇱 Chile</option>
        <option value="MLU">🇺🇾 Uruguay</option>
      </select>
    </label>
    <label>
      Máx. productos
      <input type="number" id="limitInput" class="qty-input" value="5" min="1" max="20">
    </label>
    <label>
      <input type="checkbox" id="chkDesc" checked>
      Incluir descripción
    </label>
    <label>
      <input type="checkbox" id="chkOnlyNew" checked>
      Solo nuevos
    </label>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Status -->
  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="statusText">Ingresa una búsqueda para comenzar</span>
  </div>

  <!-- Preview cards -->
  <div class="preview-grid" id="previewGrid"></div>

  <!-- JSON output -->
  <div class="output-section">
    <div class="output-header">
      <span id="outputLabel">JSON — 0 productos</span>
      <div class="output-actions">
        <button class="btn btn-outline" onclick="clearAll()" style="padding:5px 14px;font-size:.8rem">Limpiar</button>
        <button class="btn btn-primary" onclick="copyJson()" style="padding:5px 14px;font-size:.8rem">📋 Copiar JSON</button>
      </div>
    </div>
    <textarea id="jsonOut" readonly placeholder="El JSON aparecerá aquí..."></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const ML_API = 'https://api.mercadolibre.com';

  function fmtCOP(n) {
    return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
  }

  function setStatus(text, loading = false) {
    const el = document.getElementById('status');
    el.querySelector('#statusText').textContent = text;
    el.classList.toggle('loading', loading);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function clearAll() {
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('jsonOut').value = '';
    document.getElementById('outputLabel').textContent = 'JSON — 0 productos';
    document.getElementById('queryInput').value = '';
    clearError();
    setStatus('Ingresa una búsqueda para comenzar');
  }

  // ── Fetch with timeout helper ──
  async function fetchWithTimeout(url, ms = 8000) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(tid);
      return res;
    } catch (e) {
      clearTimeout(tid);
      throw e;
    }
  }

  // ── Main search ──
  async function doSearch() {
    const query   = document.getElementById('queryInput').value.trim();
    const site    = document.getElementById('siteSel').value;
    const limit   = Math.min(Math.max(parseInt(document.getElementById('limitInput').value) || 5, 1), 20);
    const wantDesc= document.getElementById('chkDesc').checked;
    const onlyNew = document.getElementById('chkOnlyNew').checked;

    if (!query) { showToast('Escribe una búsqueda primero'); document.getElementById('queryInput').focus(); return; }

    clearError();
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('jsonOut').value = '';
    document.getElementById('btnSearch').disabled = true;
    setStatus('Buscando en MercadoLibre…', true);

    try {
      // 1. Search
      let searchUrl = `${ML_API}/sites/${site}/search?q=${encodeURIComponent(query)}&limit=${limit}`;
      if (onlyNew) searchUrl += '&condition=new';

      const searchRes = await fetchWithTimeout(searchUrl);
      if (!searchRes.ok) throw new Error(`Search API respondió ${searchRes.status}`);
      const searchData = await searchRes.json();
      const results    = searchData.results || [];

      if (!results.length) {
        setStatus('Sin resultados para esa búsqueda.');
        showError('No se encontraron productos. Prueba con otras palabras clave.');
        return;
      }

      setStatus(`Obteniendo detalles de ${results.length} producto(s)…`, true);

      // 2. Fetch item details in parallel
      const detailPromises = results.map(r =>
        fetchWithTimeout(`${ML_API}/items/${r.id}`)
          .then(res => res.ok ? res.json() : null)
          .catch(() => null)
      );

      let descPromises = [];
      if (wantDesc) {
        descPromises = results.map(r =>
          fetchWithTimeout(`${ML_API}/items/${r.id}/description`)
            .then(res => res.ok ? res.json() : null)
            .catch(() => null)
        );
      }

      const [details, descs] = await Promise.all([
        Promise.all(detailPromises),
        wantDesc ? Promise.all(descPromises) : Promise.resolve(results.map(() => null)),
      ]);

      // 3. Map to internal shape
      const products = results.map((r, i) => {
        const d    = details[i];
        const desc = descs[i];

        const price    = d?.price    ?? r.price;
        const oldPrice = d?.original_price ?? r.original_price ?? null;

        // Best image: prefer item pictures array, fallback to thumbnail
        let image = r.thumbnail?.replace('-I.jpg', '-O.jpg') || '';
        if (d?.pictures?.length) {
          image = d.pictures[0].secure_url || d.pictures[0].url || image;
        }

        // Tags from title words (lowercase, no stopwords)
        const stopwords = new Set(['de','la','el','lo','los','las','un','una','con','para','por','y','en','del','al','a','e','o','u','es','se','su','que']);
        const tags = (d?.title || r.title)
          .toLowerCase()
          .replace(/[^a-záéíóúüñ\s]/g, ' ')
          .split(/\s+/)
          .filter(w => w.length > 2 && !stopwords.has(w))
          .slice(0, 8)
          .join(' ');

        const badges = [];
        if (d?.condition === 'new' || r.condition === 'new') badges.push('new');
        if (oldPrice && price < oldPrice) badges.push('top');

        return {
          name:          d?.title        || r.title,
          price:         price,
          originalPrice: (oldPrice && oldPrice > price) ? oldPrice : null,
          image:         image,
          description:   desc?.plain_text || desc?.text || '',
          category:      d?.category_id  || r.category_id || '',
          tags:          tags,
          badges:        badges,
          featured:      false,
          active:        true,
          stock:         null,
          // meta — ayuda a rastrear el origen, eliminar antes de insertar en BD
          _ml_id:        r.id,
          _ml_url:       r.permalink     || d?.permalink || '',
          _ml_seller:    r.seller?.id    || null,
          _ml_condition: d?.condition    || r.condition  || null,
        };
      });

      // 4. Render preview
      const grid = document.getElementById('previewGrid');
      grid.innerHTML = products.map((p, i) => {
        const disc = p.originalPrice ? Math.round((p.originalPrice - p.price) / p.originalPrice * 100) : 0;
        return `<div class="preview-card">
          <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.style.opacity='.3'">
          <div class="pc-body">
            <div class="pc-name">${p.name}</div>
            <div class="pc-price">${fmtCOP(p.price)}</div>
            ${p.originalPrice ? `<div class="pc-old">${fmtCOP(p.originalPrice)}</div><div class="pc-disc">-${disc}% OFF</div>` : ''}
            <div class="pc-cond">${p._ml_condition || ''}</div>
          </div>
        </div>`;
      }).join('');

      // 5. Output JSON
      const jsonStr = JSON.stringify(products, null, 2);
      document.getElementById('jsonOut').value = jsonStr;
      document.getElementById('outputLabel').textContent = `JSON — ${products.length} producto(s)`;
      setStatus(`✅ ${products.length} producto(s) encontrado(s) para "${query}"`);

    } catch (e) {
      console.error(e);
      const msg = e.name === 'AbortError'
        ? 'Tiempo de espera agotado. Revisa tu conexión.'
        : `Error al consultar la API: ${e.message}`;
      showError(msg);
      setStatus('Ocurrió un error.');
    } finally {
      document.getElementById('btnSearch').disabled = false;
    }
  }

  function copyJson() {
    const ta = document.getElementById('jsonOut');
    if (!ta.value.trim()) { showToast('No hay JSON para copiar'); return; }
    navigator.clipboard.writeText(ta.value)
      .then(() => showToast('✅ JSON copiado al portapapeles'))
      .catch(() => { ta.select(); document.execCommand('copy'); showToast('✅ Copiado'); });
  }

  // Enter key on input
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
