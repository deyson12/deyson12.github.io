<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de pago — PideFacil</title>
<link rel="icon" type="image/x-icon" href="./pidefacil-logo.ico">
<link rel="shortcut icon" href="./pidefacil-logo.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#F15200;--primary-dark:#CC4500;--primary-light:#FFF1EA;
  --secondary:#00A651;--accent:#FFD700;
  --bg:#F8F9FA;--bg-card:#FFFFFF;--bg-header:#FFFFFF;
  --text:#1A1A2E;--text-primary:#1A1A2E;--text-secondary:#4A5568;--text-muted:#9CA3AF;
  --border:#E5E7EB;--border-light:#F3F4F6;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --shadow-xl:0 16px 40px rgba(0,0,0,.16);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:9999px;
  --font-head:'Plus Jakarta Sans',sans-serif;--font-body:'DM Sans',sans-serif;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
  --whatsapp:#25D366;
}
[data-theme="dark"]{
  --bg:#0F172A;--bg-card:#1E293B;--bg-header:#1E293B;
  --text:#F1F5F9;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
  --border:#334155;--border-light:#1E293B;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);min-height:100vh;transition:background .3s,color .3s;}

/* ── HEADER ── */
.header{background:var(--bg-header);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:14px 20px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-img{width:32px;height:44px;object-fit:contain;}
.logo-text{font-family:var(--font-head);font-weight:800;font-size:20px;color:var(--text-primary);}
.logo-text span{color:var(--primary);}
.header-back{margin-left:auto;display:flex;align-items:center;gap:7px;background:none;border:1.5px solid var(--border);padding:8px 16px;border-radius:var(--radius-full);font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:var(--transition);text-decoration:none;}
.header-back:hover{border-color:var(--primary);color:var(--primary);}
.header-back svg{width:15px;height:15px;}

/* ── PAGE ── */
.page{max-width:520px;margin:0 auto;padding:28px 16px 60px;}

/* ── STATUS CARD (top) ── */
.status-card{background:var(--bg-card);border-radius:var(--radius-xl);padding:32px 24px;text-align:center;box-shadow:var(--shadow-md);border:1px solid var(--border);}
.status-icon{font-size:64px;line-height:1;margin-bottom:12px;}
.status-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text-primary);margin-bottom:6px;}
.status-sub{font-size:14px;color:var(--text-secondary);line-height:1.6;}
.status-ref-wrap{display:inline-flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);padding:8px 16px;border-radius:var(--radius-full);margin-top:14px;}
.status-ref-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.status-ref-val{font-family:monospace;font-size:13px;font-weight:600;color:var(--text-primary);}

/* ── WOMPI STATUS CHIPS ── */
.status-wompi-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
.wompi-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:var(--radius-full);font-size:12px;font-weight:700;}
.wompi-chip-approved{background:rgba(0,166,81,.12);color:#00A651;}
.wompi-chip-pending{background:rgba(241,82,0,.12);color:var(--primary);}
.wompi-chip-declined{background:rgba(239,68,68,.12);color:#EF4444;}
.wompi-chip-unknown{background:var(--border-light);color:var(--text-muted);}

/* ── SECTIONS ── */
.section-card{background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);margin-top:16px;overflow:hidden;}
.section-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text-primary);}
.section-head svg{width:16px;height:16px;color:var(--primary);flex-shrink:0;}
.section-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px;}

/* ── ORDER ITEM ── */
.order-item{display:flex;align-items:flex-start;gap:11px;padding:10px;background:var(--bg);border-radius:var(--radius-md);}
.order-item-ref{font-size:10px;font-family:monospace;color:var(--text-muted);margin-top:2px;}
.order-item-name{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.35;}
.order-item-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.order-item-qty{font-size:12px;color:var(--text-muted);}
.order-item-price{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--primary);}
.order-total-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text-secondary);}
.order-total-row.grand{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--text-primary);}

/* ── INFO ROW ── */
.info-row{display:flex;gap:9px;align-items:flex-start;}
.info-row-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.info-row-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.info-row-val{font-size:13px;color:var(--text-primary);font-weight:500;}

/* ── ACTIONS ── */
.actions{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.btn-wa-send{width:100%;padding:15px;background:#25D366;color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;border:none;cursor:pointer;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:9px;transition:var(--transition);}
.btn-wa-send:hover{background:#1ebe5a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.3);}
.btn-wa-send svg{width:21px;height:21px;flex-shrink:0;}
.btn-wa-send:disabled{background:#9CA3AF;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-secondary{width:100%;padding:12px;background:transparent;color:var(--text-secondary);font-family:var(--font-head);font-size:14px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--transition);text-decoration:none;}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
.btn-secondary svg{width:17px;height:17px;}

/* ── ALERT ── */
.alert{padding:12px 16px;border-radius:var(--radius-md);font-size:13px;display:flex;align-items:flex-start;gap:9px;line-height:1.5;}
.alert-warn{background:rgba(245,158,11,.1);color:#B45309;border:1px solid rgba(245,158,11,.25);}
.alert-ok{background:rgba(0,166,81,.1);color:#065F46;border:1px solid rgba(0,166,81,.2);}
.alert-err{background:rgba(239,68,68,.1);color:#991B1B;border:1px solid rgba(239,68,68,.2);}
.alert svg,.alert-icon{width:17px;height:17px;flex-shrink:0;margin-top:1px;}

/* ── LOADING SPINNER ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px;color:var(--text-muted);font-size:14px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important;}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="./index.html">
    <img class="logo-img" src="./pidefacil-logo.ico" alt="PideFacil">
    <span class="logo-text">Pide<span>Facil</span></span>
  </a>
  <a class="header-back" href="./index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver al inicio
  </a>
</header>

<main class="page" id="mainPage">
  <!-- Loading state -->
  <div class="loader" id="stateLoader">
    <div class="spinner"></div>
    Procesando tu pago...
  </div>

  <!-- Content (hidden until parsed) -->
  <div id="stateContent" class="hidden">

    <!-- Status card -->
    <div class="status-card">
      <div class="status-icon" id="statusIcon">🔐</div>
      <h1 class="status-title" id="statusTitle">Validando pago…</h1>
      <p class="status-sub" id="statusSub"></p>
      <div class="status-wompi-row" id="statusWompiRow"></div>
      <div class="status-ref-wrap" id="statusRefWrap" style="display:none">
        <span class="status-ref-label">Referencia</span>
        <span class="status-ref-val" id="statusRef"></span>
      </div>
    </div>

    <!-- Order items -->
    <div class="section-card" id="sectionItems">
      <div class="section-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Productos pedidos
      </div>
      <div class="section-body" id="itemsBody"></div>
    </div>

    <!-- Delivery info -->
    <div class="section-card">
      <div class="section-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Datos de entrega
      </div>
      <div class="section-body" id="deliveryBody"></div>
    </div>

    <!-- Payment info -->
    <div class="section-card">
      <div class="section-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Pago
      </div>
      <div class="section-body" id="paymentBody"></div>
    </div>

    <!-- CTA -->
    <div class="actions">
      <button class="btn-wa-send" id="btnConfirmWa" onclick="sendOrderWhatsApp()">
        <svg viewBox="0 0 24 24"><path fill="#fff" fill-opacity=".3" d="M12 0C5.373 0 0 5.373 0 12c0 2.025.507 3.967 1.399 5.671L.1 23.9l6.499-1.699A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/><path fill="#fff" d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.977-1.41A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2Zm4.898 14.07c-.202.566-1.183 1.08-1.636 1.146-.42.06-.95.085-1.534-.097a14.1 14.1 0 01-1.389-.514c-2.442-1.054-4.037-3.51-4.16-3.672-.12-.162-.98-1.302-.98-2.484 0-1.18.619-1.762.838-2.003.22-.24.48-.3.64-.3l.46.009c.147.006.346-.056.54.412.202.48.687 1.66.747 1.78.06.12.1.26.02.42-.08.16-.12.26-.24.4-.12.14-.252.313-.36.42-.12.12-.245.25-.105.49.14.24.62.98 1.33 1.587.914.8 1.685 1.047 1.925 1.167.24.12.38.1.52-.06.14-.16.6-.7.76-.94.16-.24.32-.2.54-.12.22.08 1.4.66 1.64.78.24.12.4.18.46.28.06.1.06.581-.14 1.143Z"/></svg>
        Enviar pedido por WhatsApp
      </button>
      <a class="btn-secondary" href="./index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Volver al catálogo
      </a>
    </div>

  </div><!-- /stateContent -->

  <!-- Error state (no pending order) -->
  <div id="stateError" class="hidden" style="padding-top:40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div style="font-size:56px">😕</div>
    <h2 style="font-family:var(--font-head);font-size:20px;font-weight:800">No encontramos tu pedido</h2>
    <p style="font-size:14px;color:var(--text-secondary);max-width:300px;line-height:1.6">Puede que ya lo hayas confirmado o que el enlace haya expirado.</p>
    <a class="btn-secondary" href="./index.html" style="max-width:280px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver al inicio
    </a>
  </div>

</main>

<script>
const WA_PHONE = '573136090247';
const STORE_NAME = 'PideFacil';
const ORDERS_KEY = 'cy_orders_history';

// ── Guardar en historial ───────────────────────────────────
function saveOrderToHistory(record) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]'); } catch(e) {}
  hist.unshift(record);
  if (hist.length > 100) hist = hist.slice(0, 100);
  localStorage.setItem(ORDERS_KEY, JSON.stringify(hist));
}

// ── Helpers ────────────────────────────────────────────────
function fmtPrice(n) { return '$' + Number(n).toLocaleString('es-CO'); }
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// ── Read URL params (Wompi attaches id, status, etc.) ─────
function getWompiParams() {
  const sp = new URLSearchParams(window.location.search);
  return {
    wref:   sp.get('wref')   || sp.get('reference') || '',
    id:     sp.get('id')     || '',           // Wompi transaction id
    status: (sp.get('status') || '').toLowerCase(),  // APPROVED / PENDING / DECLINED
    amount: sp.get('amount-in-cents') || '',
  };
}

// ── Map Wompi status to UI ─────────────────────────────────
function statusUI(status) {
  const map = {
    approved: { icon:'✅', title:'¡Pago aprobado!',        sub:'Tu pago fue procesado con éxito. Confirma tu pedido por WhatsApp para coordinar el envío.',  chip:'wompi-chip-approved', label:'APROBADO' },
    pending:  { icon:'⏳', title:'Pago en proceso',         sub:'Tu pago está siendo procesado. Una vez aprobado te confirmaremos por WhatsApp.',              chip:'wompi-chip-pending',  label:'EN PROCESO' },
    declined: { icon:'❌', title:'Pago rechazado',          sub:'El pago no pudo completarse. Puedes intentarlo de nuevo o elegir otro método de pago.',       chip:'wompi-chip-declined', label:'RECHAZADO' },
    voided:   { icon:'⛔', title:'Pago anulado',            sub:'La transacción fue anulada.',                                                                  chip:'wompi-chip-declined', label:'ANULADO' },
    error:    { icon:'⚠️', title:'Error en el pago',        sub:'Ocurrió un problema. Intenta más tarde o elige otro método.',                                  chip:'wompi-chip-declined', label:'ERROR' },
  };
  return map[status] || { icon:'🔐', title:'Pago pendiente de confirmación', sub:'Por favor confirma tu pedido por WhatsApp para continuar.', chip:'wompi-chip-unknown', label:'DESCONOCIDO' };
}

// ── Render order items ─────────────────────────────────────
function renderItems(od, totalAmount) {
  const body = document.getElementById('itemsBody');
  let html = '';

  // Parse itemsBlock (WhatsApp text) to extract products
  // Format: (REF:XXXXXXXX) *Name*\n  qty und x $price = $total\n\n
  const lineRe = /\(REF:([A-Z0-9]+)\)\s+\*(.+?)\*[\r\n]+\s+(\d+)\s+und\s+x\s+\$[\d.,]+\s+=\s+(\$[\d.,]+)/g;
  let m, found = false;
  while ((m = lineRe.exec(od.itemsBlock)) !== null) {
    found = true;
    html += `<div class="order-item">
      <div style="flex:1;min-width:0">
        <div class="order-item-ref">REF: ${m[1]}</div>
        <div class="order-item-name">${m[2]}</div>
        <div class="order-item-meta">
          <span class="order-item-qty">${m[3]} unidad${m[3]>1?'es':''}</span>
          <span class="order-item-price">${m[4]}</span>
        </div>
      </div>
    </div>`;
  }

  if (!found) {
    // Fallback: show raw summaryHtml
    html += `<div style="font-size:13px;color:var(--text-secondary);line-height:1.7">${od.summaryHtml || 'Pedido confirmado'}</div>`;
  }

  html += `<div class="order-total-row grand"><span>Total</span><span>${od.totalFmt || fmtPrice(totalAmount)}</span></div>`;
  body.innerHTML = html;
}

// ── Render delivery ────────────────────────────────────────
function renderDelivery(od) {
  document.getElementById('deliveryBody').innerHTML = `
    <div class="info-row"><span class="info-row-icon">👤</span><div><div class="info-row-label">A nombre de</div><div class="info-row-val">${od.nom || '—'}</div></div></div>
    <div class="info-row"><span class="info-row-icon">📍</span><div><div class="info-row-label">Dirección</div><div class="info-row-val">${od.dir || '—'}</div></div></div>
  `;
}

// ── Render payment info ────────────────────────────────────
function renderPayment(ref, wompiId, status, rawAmount) {
  const amountCOP = rawAmount ? fmtPrice(Math.round(Number(rawAmount) / 100)) : '—';
  document.getElementById('paymentBody').innerHTML = `
    <div class="info-row"><span class="info-row-icon">💳</span><div><div class="info-row-label">Método</div><div class="info-row-val">Wompi (Tarjeta / PSE)</div></div></div>
    ${wompiId ? `<div class="info-row"><span class="info-row-icon">🔢</span><div><div class="info-row-label">ID Transacción Wompi</div><div class="info-row-val" style="font-family:monospace;font-size:12px">${wompiId}</div></div></div>` : ''}
    <div class="info-row"><span class="info-row-icon">🧾</span><div><div class="info-row-label">Referencia del pedido</div><div class="info-row-val" style="font-family:monospace;font-size:12px">${ref}</div></div></div>
    ${rawAmount ? `<div class="info-row"><span class="info-row-icon">💰</span><div><div class="info-row-label">Monto cobrado</div><div class="info-row-val">${amountCOP}</div></div></div>` : ''}
  `;
}

// ── Build WhatsApp message ─────────────────────────────────
let _pending = null; // module-level so sendOrderWhatsApp can access it

function buildWAMessage(pending, wompiParams, statusLabel) {
  const { ref, od } = pending;
  const { id: wompiId, status } = wompiParams;
  let msg = `Hola, confirmo mi pedido en *${STORE_NAME}*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  msg += od.itemsBlock;
  msg += `*A nombre de:* ${od.nom}\n`;
  msg += `*Dirección de entrega:* ${od.dir}\n`;
  msg += `*Método de pago:* Wompi\n`;
  msg += `*Estado del pago:* ${statusLabel}\n`;
  msg += `*Referencia:* ${ref}\n`;
  if (wompiId) msg += `*ID Transacción:* ${wompiId}\n`;
  msg += `\nGracias`;
  return msg;
}

function sendOrderWhatsApp() {
  if (!_pending) return;
  const wompiParams = getWompiParams();
  const ui = statusUI(wompiParams.status);

  // Guardar en historial antes de abrir WhatsApp
  const { ref, od } = _pending;
  saveOrderToHistory({
    id: 'ORD-' + Date.now() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase(),
    date: new Date().toISOString(),
    type: 'wompi',
    pago: 'Wompi',
    nombre: od.nom,
    direccion: od.dir,
    total: od.totalAmount,
    totalFmt: od.totalFmt || ('$' + Number(od.totalAmount).toLocaleString('es-CO')),
    items: od.items || [],
    itemsBlock: od.itemsBlock,
    summaryHtml: od.summaryHtml,
    wompiRef: ref,
    wompiId: wompiParams.id || null,
    wompiStatus: wompiParams.status || null,
  });

  const msg = buildWAMessage(_pending, wompiParams, ui.label);
  window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── Main init ──────────────────────────────────────────────
function init() {
  const params = getWompiParams();

  // Try to match reference with localStorage
  const raw = localStorage.getItem('cy_wompi_pending');
  let pending = null;

  if (raw) {
    try { pending = JSON.parse(raw); } catch(e) {}
  }

  // Validate ref match (wref from URL or reference param)
  const incomingRef = params.wref || params.id;
  if (!pending || (incomingRef && pending.ref !== decodeURIComponent(incomingRef))) {
    // Try to recover — if params have the ref, accept it if close enough
    if (!pending) {
      hide('stateLoader');
      show('stateError');
      return;
    }
  }

  _pending = pending;
  const { ref, od } = pending;

  // Overwrite cy_wompi_pending with enriched data (add Wompi status + id)
  const enriched = { ...pending, wompiStatus: params.status, wompiId: params.id, resolvedAt: new Date().toISOString() };
  localStorage.setItem('cy_wompi_pending', JSON.stringify(enriched));

  // ── UI ──
  const ui = statusUI(params.status);

  document.getElementById('statusIcon').textContent  = ui.icon;
  document.getElementById('statusTitle').textContent = ui.title;
  document.getElementById('statusSub').textContent   = ui.sub;

  // Wompi status chip
  const row = document.getElementById('statusWompiRow');
  row.innerHTML = `<span class="wompi-chip ${ui.chip}">${ui.label}</span>`;

  // Reference pill
  document.getElementById('statusRef').textContent = ref;
  document.getElementById('statusRefWrap').style.display = 'inline-flex';

  // Sections
  renderItems(od, od.totalAmount);
  renderDelivery(od);
  renderPayment(ref, params.id, params.status, params.amount);

  // Alert based on status
  const actions = document.querySelector('.actions');
  if (params.status === 'declined' || params.status === 'voided' || params.status === 'error') {
    const alert = document.createElement('div');
    alert.className = 'alert alert-err';
    alert.innerHTML = `<span class="alert-icon">⚠️</span><span>El pago no fue aprobado. Puedes volver al catálogo y hacer el pedido de nuevo eligiendo otro método de pago.</span>`;
    actions.prepend(alert);
    // Disable WA button since payment failed
    document.getElementById('btnConfirmWa').disabled = true;
    document.getElementById('btnConfirmWa').textContent = 'Pago no completado';
  } else if (params.status === 'pending' || !params.status) {
    const alert = document.createElement('div');
    alert.className = 'alert alert-warn';
    alert.innerHTML = `<span class="alert-icon">⏳</span><span>El pago aún está procesándose. Puedes enviar el pedido ahora y te confirmaremos cuando se apruebe.</span>`;
    actions.prepend(alert);
  } else if (params.status === 'approved') {
    const alert = document.createElement('div');
    alert.className = 'alert alert-ok';
    alert.innerHTML = `<span class="alert-icon">✅</span><span>Pago aprobado. Envía tu pedido por WhatsApp para que coordinemos el envío.</span>`;
    actions.prepend(alert);
  }

  hide('stateLoader');
  show('stateContent');
}

// Run on load
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
